  msg = msg.replace(/{Nama}/g, name);
  if (sekolah) {
    msg = msg.replace(/{sekolah}/g, sekolah);
    msg = msg.replace(/{Sekolah}/g, sekolah);
  }
  sentSet.add(name);
  saveSent();
  renderList();
  window.open('https://wa.me/' + phone + '?text=' + encodeURIComponent(msg), '_blank');
}

function sendAllPending() {
  var pending = [];
  for (var i = 0; i < DATA.length; i++) {
    if (!sentSet.has(DATA[i].name)) pending.push(DATA[i]);
  }
  if (pending.length === 0) return showToast('✅ Semua sudah terkirim!');
  var tpl = document.getElementById('templateMsg').value;
  for (var i = 0; i < pending.length; i++) {
    var c = pending[i];
    var msg = tpl.replace(/{nama}/g, c.name);
    msg = msg.replace(/{Nama}/g, c.name);
    window.open('https://wa.me/' + c.phone + '?text=' + encodeURIComponent(msg), '_blank');
  }
  for (var i = 0; i < pending.length; i++) {
    sentSet.add(pending[i].name);
  }
  saveSent();
  renderList();
  showToast('✅ Membuka ' + pending.length + ' chat WA');
}

function previewTemplate() {
  var tpl = document.getElementById('templateMsg').value;
  if (DATA.length > 0) {
    alert(tpl.replace(/{nama}/g, DATA[0].name).replace(/{Nama}/g, DATA[0].name));
  }
}

function resetDefaultTemplate() {
  document.getElementById('templateMsg').value = '*UPDATE IDENTITAS RAPOR* 📋\n\nYth. Bapak/Ibu Wali {nama}\n\nDengan hormat,\nKami menginformasikan bahwa rapor semester ini telah tersedia. Mohon untuk mengupdate identitas data putra/putri Bapak/Ibu melalui link berikut:\n\n🔗 https://bit.ly/UpdateIdentitasRapor\n\nAtas perhatian dan kerjasamanya, kami ucapkan terima kasih.\n\nWassalamu\'alaikum warahmatullahi wabarakatuh\n🙏';
  showToast('↻ Template direset');
}

function resetAllStatus() {
  if (!confirm('Reset semua status kirim?')) return;
  sentSet.clear();
  saveSent();
  renderList();
  showToast('↻ Status direset');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

function renderList() {
  var q = document.getElementById('searchInput').value.toLowerCase().trim();
  var filtered = [];
  for (var i = 0; i < DATA.length; i++) {
    if (!q || DATA[i].name.toLowerCase().indexOf(q) !== -1) {
      filtered.push(DATA[i]);
    }
  }
  var sent = 0;
  for (var i = 0; i < DATA.length; i++) {
    if (sentSet.has(DATA[i].name)) sent++;
  }

  document.getElementById('sentCount').textContent = sent;
  var pct = DATA.length > 0 ? (sent / DATA.length * 100) + '%' : '0%';
  document.getElementById('progressFill').style.width = pct;
  document.getElementById('totalCount').textContent = filtered.length;

  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var c = filtered[i];
    var isSent = sentSet.has(c.name);
    var nameE = c.name.replace(/'/g, "\\'");
    var sekolahE = (c.sekolah || '').replace(/'/g, "\\'");
    var phoneE = c.phone.replace(/'/g, "\\'");

    html += '<div class="contact-card' + (isSent ? ' sent' : '') + '">';
    html += '  <div class="top-row">';
    html += '    <div class="avatar">' + c.name.charAt(0).toUpperCase() + '</div>';
    html += '    <div class="info">';
    html += '      <div class="name">' + c.no + '. ' + c.name + '</div>';
    html += '      <div class="sekolah">' + (c.sekolah || '') + '</div>';
    html += '      <div class="phone">+' + phoneE + '</div>';
    html += '    </div>';
    html += '  </div>';
    html += '  <div class="actions">';
    html += '    <button class="btn-kirim" onclick="sendWA(\'' + phoneE + '\',\'' + nameE + '\',\'' + sekolahE + '\')">📤 Kirim WA</button>';
    html += '    <span class="status-badge ' + (isSent ? 'terkirim' : 'belum') + '" onclick="toggleStatus(\'' + nameE + '\')">' + (isSent ? '✓ Terkirim' : '○ Belum') + '</span>';
    html += '  </div>';
    html += '</div>';
  }
  document.getElementById('contactList').innerHTML = html;
}

renderList();
</script>
</body>
</html>
