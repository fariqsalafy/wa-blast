<style>

  :root {
    --navy: #0B1220;
    --navy2: #162033;
    --navy3: #1A2D4A;
    --cyan: #00E5FF;
    --cyan-dim: rgba(0,229,255,0.08);
    --text: #E0E6F0;
    --text-dim: #8899B0;
    --gold: #FFD54F;
    --red: #FF6B6B;
    --green: #4CAF50;
  }

  body {

    font-size: 22px;
    font-weight: 600;

  header p {

    font-size: 13px;

  /* Upload section */

    border: 1px dashed rgba(0,229,255,0.2);

    padding: 35px 20px;
    text-align: center;
    margin-bottom: 20px;

  }
  .upload-section.dragover {
    border-color: var(--cyan);
    background: rgba(0,229,255,0.05);
  }
  .upload-section label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 24px;
    background: var(--cyan);
    color: var(--navy);
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all .2s;
  }
  .upload-section label:hover {

    transform: translateY(-1px);

  .upload-section input[type="file"] { display: none; }
  .upload-section .info-text {

    font-size: 12px;
    margin-top: 10px;
  }
  .upload-section .preview-data {
    margin-top: 12px;
    font-size: 12px;
    color: var(--cyan);
    opacity: 0.6;
  }

  /* Message Template */
  .template-section {
    background: var(--navy2);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    border: 1px solid rgba(0,229,255,0.06);
  }
  .template-section label {
    display: block;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .template-section textarea {
    width: 100%;
    min-height: 90px;
    padding: 12px;
    background: var(--navy);
    border: 1px solid rgba(0,229,255,0.12);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    line-height: 1.6;
    resize: vertical;
    font-family: inherit;
  }
  .template-section textarea:focus {
    outline: none;
    border-color: var(--cyan);
  }
  .template-section .hint {
    color: var(--text-dim);
    font-size: 11px;
    margin-top: 6px;
  }
  .template-section .hint code {
    background: rgba(0,229,255,0.08);
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 11px;
    color: var(--cyan);
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    background: var(--navy2);
    border-radius: 10px;
    margin-bottom: 20px;
    border: 1px solid rgba(0,229,255,0.06);

  .stats-bar .count {

    color: var(--text-dim);
  }
  .stats-bar .count strong {

  .stats-bar .search-box {

    gap: 8px;

  .stats-bar .search-box input::placeholder {

  /* Contact grid */

    opacity: 0;
    transition: opacity .25s;

<body>
<header>
  <div class="container">
    <h1>📤 WA Blast</h1>
    <p>Klik nama → otomatis buka WA → pesan terisi → tinggal send</p>
  </div>
</header>

<div class="container">
  <!-- Upload Excel -->
  <div class="upload-section" id="dropZone">
    <label for="fileInput">
      <span>📁</span> Upload File Excel (.xlsx)
    </label>
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <div class="info-text">Format: minimal kolom <strong>Nama</strong> & <strong>No HP</strong> (atau <strong>Phone</strong> / <strong>Telepon</strong>)</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
let contacts = [];

// ========== SheetJS: Read Excel ==========
function handleFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(sheet, { defval: '' });

      // Map columns (handle various Indonesian formats)
      contacts = json.map(row => {
        const name = row['NAMA SISWA'] || row['Nama Siswa'] || row['Nama'] || row['nama'] || row['Name'] || row['name'] || Object.values(row)[0] || '';
        const phone = String(
          row['No. Telp'] || row['No Telp'] || row['No Hp'] || row['No HP'] || row['no hp'] || row['no_hp'] || 
          row['Phone'] || row['phone'] || row['Telepon'] || row['telp'] ||
          row['WA'] || row['wa'] || row['WhatsApp'] || Object.values(row)[1] || ''
        ).replace(/[^0-9]/g, '');
        // Format phone: if starts with 0, replace with 62
        const cleanPhone = phone.replace(/^0+/, '62');
        return { 
          name: String(name).trim(), 
          phone: cleanPhone,
          sekolah: row['ASAL SEKOLAH'] || row['Asal Sekolah'] || '',
          gender: row['L/P'] || ''
        };
      }).filter(c => c.name && c.phone.length >= 10 && c.phone !== '62');

      // Show preview
      const preview = document.getElementById('previewData');
      preview.textContent = `✓ ${contacts.length} kontak berhasil dimuat`;

      renderContacts();
    } catch(err) {
      showToast('Gagal baca file: ' + err.message, true);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ========== Render ==========
function renderContacts() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  const filtered = query ? contacts.filter(c => c.name.toLowerCase().includes(query)) : contacts;

  const list = document.getElementById('contactList');
  const empty = document.getElementById('emptyState');
  const stats = document.getElementById('statsBar');
  const total = document.getElementById('totalCount');

  if (contacts.length === 0) {
    list.innerHTML = '';
    stats.style.display = 'none';
    empty.style.display = 'block';
    return;
  }

  stats.style.display = 'flex';
  total.textContent = contacts.length;
  empty.style.display = 'none';

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><p>Tidak ditemukan</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(c => {
    const initial = c.name.charAt(0).toUpperCase();
    const cleanPhone = c.phone.startsWith('62') ? c.phone : '62' + c.phone.replace(/^0+/, '');
    return `
      <div class="contact-card" onclick="sendWA('${cleanPhone}', '${c.name.replace(/'/g, "\\'")}', '${(c.sekolah || '').replace(/'/g, "\\'")}')" title="Klik untuk kirim WA">
        <div class="avatar">${initial}</div>
        <div class="info">
          <div class="name">${c.name}</div>
          <div class="phone">+${cleanPhone}</div>
          ${c.sekolah ? `<div class="sekolah">${c.sekolah}</div>` : ''}
        </div>
        <div class="wa-icon">💬</div>
      </div>
    `;
  }).join('');
}

// ========== Send WA ==========
function sendWA(phone, name, sekolah) {
  const template = document.getElementById('templateMsg').value;
  let msg = template.replace(/\{\{nama\}\}/g, name);
  msg = msg.replace(/\{\{Nama\}\}/g, name);
  msg = msg.replace(/\{\{sekolah\}\}/g, sekolah || '');
  msg = msg.replace(/\{\{Sekolah\}\}/g, sekolah || '');

  const encoded = encodeURIComponent(msg);
  const url = `https://wa.me/${phone}?text=${encoded}`;

  window.open(url, '_blank');
  showToast(`✓ Membuka WA untuk ${name}`);
}

// ========== Toast ==========
function showToast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = isError ? 'rgba(255,107,107,0.3)' : 'rgba(0,229,255,0.15)';
  el.style.color = isError ? '#FF6B6B' : '#E0E6F0';
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ========== File input ==========
document.getElementById('fileInput').addEventListener('change', function(e) {
  if (e.target.files.length) handleFile(e.target.files[0]);
});

// ========== Drag & Drop ==========
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('dragover');
});
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});

// ========== Search ==========
document.getElementById('searchInput').addEventListener('input', renderContacts);
