let contacts = EMBEDDED_DATA;
let sentSet = loadSentSet();

function loadSentSet() {
  try {
    const raw = localStorage.getItem('waBlastSent');
    return raw ? new Set(JSON.parse(raw)) : new Set();
  } catch(e) { return new Set(); }
}

function saveSentSet() {
  localStorage.setItem('waBlastSent', JSON.stringify([...sentSet]));
}

function toggleStatus(name) {
  if (sentSet.has(name)) sentSet.delete(name);
  else sentSet.add(name);
  saveSentSet();
  render();
}

function markSent(name) {
  sentSet.add(name);
  saveSentSet();
  render();
}

function getTemplate() {
  return document.getElementById('templateText').value;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function sendAllPending() {
  const pending = contacts.filter(c => !sentSet.has(c.name));
  if (pending.length === 0) return showToast('✅ Semua sudah terkirim!');
  const tmpl = getTemplate();
  pending.forEach(c => {
    const msg = tmpl.replace(/{{nama}}/g, c.name);
    const url = `https://wa.me/${c.phone}?text=${encodeURIComponent(msg)}`;
    window.open(url, '_blank');
  });
  showToast(`✅ Membuka ${pending.length} chat WA`);
}

function showTemplatePreview() {
  const tmpl = getTemplate();
  if (contacts.length > 0) {
    const preview = tmpl.replace(/{{nama}}/g, contacts[0].name);
    alert(preview);
  }
}

function resetTemplate() {
  const def = `*UPDATE IDENTITAS RAPOR* 📋

Yth. Bapak/Ibu Wali {{nama}}

Dengan hormat,
Kami menginformasikan bahwa rapor semester ini telah tersedia. Mohon untuk mengupdate identitas data putra/putri Bapak/Ibu melalui link berikut:

🔗 https://bit.ly/UpdateIdentitasRapor

Atas perhatian dan kerjasamanya, kami ucapkan terima kasih.

Wassalamu'alaikum warahmatullahi wabarakatuh
🙏`;
  document.getElementById('templateText').value = def;
  showToast('↻ Template direset');
}

function resetStatus() {
  if (!confirm('Reset semua status kirim?')) return;
  sentSet.clear();
  saveSentSet();
  render();
  showToast('↻ Status direset');
}

function render() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  const list = document.getElementById('contactList');
  const filtered = query ? contacts.filter(c => c.name.toLowerCase().includes(query)) : contacts;
  const sent = contacts.filter(c => sentSet.has(c.name)).length;

  document.getElementById('sentCount').textContent = sent;
  document.getElementById('progressFill').style.width = contacts.length > 0 ? (sent / contacts.length * 100) + '%' : '0%';
  document.getElementById('totalCount').textContent = filtered.length;

  const tmpl = getTemplate();

  list.innerHTML = filtered.map(c => {
    const initial = c.name.charAt(0).toUpperCase();
    const isSent = sentSet.has(c.name);
    const cleanPhone = c.phone.startsWith('62') ? c.phone : '62' + c.phone.replace(/^0+/, '');
    const nameEsc = c.name.replace(/'/g, "\\'");
    const sekolahEsc = (c.sekolah || '').replace(/'/g, "\\'");
    return `
      <div class="contact-card${isSent ? ' sent' : ''}">
        <div class="avatar">${initial}</div>
        <div class="info">
          <div class="name">${c.no}. ${c.name}</div>
          <div class="sekolah">${c.sekolah}</div>
        </div>
        <div class="status ${isSent ? 'sent' : 'pending'}" onclick="toggleStatus('${nameEsc}')" title="${isSent ? 'Tandai Belum' : 'Tandai Terkirim'}">
          ${isSent ? '✓' : '○'}
        </div>
        <button class="send-btn" onclick="event.stopPropagation(); markSent('${nameEsc}'); window.open('https://wa.me/${cleanPhone}?text=${encodeURIComponent(tmpl.replace(/{{nama}}/g, nameEsc))}', '_blank')">
          📤 WA
        </button>
      </div>
    `;
  }).join('');
}

render();
</script>
</body>
</html>
