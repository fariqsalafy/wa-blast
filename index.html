<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WA Blast — @belajarduluaja.id</title>
<!-- SheetJS for reading Excel -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --navy: #0B1220;
    --navy2: #162033;
    --navy3: #1A2D4A;
    --cyan: #00E5FF;
    --cyan-dim: rgba(0,229,255,0.08);
    --text: #E0E6F0;
    --text-dim: #8899B0;
    --gold: #FFD54F;
    --red: #FF6B6B;
    --green: #4CAF50;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--navy);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .container {
    width: 100%;
    max-width: 960px;
    padding: 20px;
  }

  /* Header */
  header {
    text-align: center;
    padding: 30px 0;
    border-bottom: 1px solid rgba(0,229,255,0.08);
    margin-bottom: 25px;
  }
  header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--cyan);
  }
  header p {
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 6px;
  }

  /* Upload section */
  .upload-section {
    background: var(--navy2);
    border: 1px dashed rgba(0,229,255,0.2);
    border-radius: 12px;
    padding: 35px 20px;
    text-align: center;
    margin-bottom: 20px;
    transition: all .3s;
  }
  .upload-section.dragover {
    border-color: var(--cyan);
    background: rgba(0,229,255,0.05);
  }
  .upload-section label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 24px;
    background: var(--cyan);
    color: var(--navy);
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all .2s;
  }
  .upload-section label:hover {
    background: #33EAFF;
    transform: translateY(-1px);
  }
  .upload-section input[type="file"] { display: none; }
  .upload-section .info-text {
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 10px;
  }
  .upload-section .preview-data {
    margin-top: 12px;
    font-size: 12px;
    color: var(--cyan);
    opacity: 0.6;
  }

  /* Message Template */
  .template-section {
    background: var(--navy2);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    border: 1px solid rgba(0,229,255,0.06);
  }
  .template-section label {
    display: block;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .template-section textarea {
    width: 100%;
    min-height: 90px;
    padding: 12px;
    background: var(--navy);
    border: 1px solid rgba(0,229,255,0.12);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    line-height: 1.6;
    resize: vertical;
    font-family: inherit;
  }
  .template-section textarea:focus {
    outline: none;
    border-color: var(--cyan);
  }
  .template-section .hint {
    color: var(--text-dim);
    font-size: 11px;
    margin-top: 6px;
  }
  .template-section .hint code {
    background: rgba(0,229,255,0.08);
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 11px;
    color: var(--cyan);
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    background: var(--navy2);
    border-radius: 10px;
    margin-bottom: 20px;
    border: 1px solid rgba(0,229,255,0.06);
  }
  .stats-bar .count {
    font-size: 14px;
    color: var(--text-dim);
  }
  .stats-bar .count strong {
    color: var(--cyan);
    font-weight: 600;
  }
  .stats-bar .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--navy);
    border: 1px solid rgba(0,229,255,0.1);
    border-radius: 8px;
    padding: 6px 12px;
  }
  .stats-bar .search-box input {
    background: none;
    border: none;
    color: var(--text);
    font-size: 13px;
    outline: none;
    width: 160px;
  }
  .stats-bar .search-box input::placeholder {
    color: var(--text-dim);
    font-size: 12px;
  }

  /* Contact grid */
  .contact-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
    padding-bottom: 40px;
  }
  
  .contact-card {
    background: var(--navy2);
    border: 1px solid rgba(0,229,255,0.06);
    border-radius: 12px;
    padding: 16px 18px;
    cursor: pointer;
    transition: all .25s;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }
  .contact-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    background: var(--cyan);
    opacity: 0;
    transition: opacity .25s;
  }
  .contact-card:hover {
    border-color: rgba(0,229,255,0.25);
    background: var(--navy3);
    transform: translateY(-2px);
  }
  .contact-card:hover::before {
    opacity: 0.6;
  }
  .contact-card:active {
    transform: translateY(0);
  }

  .contact-card .avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--cyan-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 15px;
    color: var(--cyan);
    flex-shrink: 0;
    border: 1px solid rgba(0,229,255,0.12);
  }
  .contact-card .info {
    flex: 1;
    min-width: 0;
  }
  .contact-card .info .name {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 3px;
  }
  .contact-card .info .phone {
    font-size: 12px;
    color: var(--text-dim);
  }
  .contact-card .info .sekolah {
    font-size: 11px;
    color: var(--cyan);
    opacity: 0.5;
    margin-top: 2px;
  }
  .contact-card .wa-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: rgba(0,229,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: var(--cyan);
    opacity: 0;
    transition: opacity .25s;
    flex-shrink: 0;
  }
  .contact-card:hover .wa-icon {
    opacity: 0.8;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-state .icon {
    font-size: 48px;
    opacity: 0.2;
    margin-bottom: 15px;
  }
  .empty-state p {
    font-size: 14px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    padding: 12px 24px;
    border-radius: 10px;
    background: var(--navy3);
    border: 1px solid rgba(0,229,255,0.15);
    color: var(--text);
    font-size: 13px;
    z-index: 999;
    opacity: 0;
    transition: all .4s;
    backdrop-filter: blur(10px);
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Sent counter / history */
  .sent-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    background: rgba(76,175,80,0.1);
    color: var(--green);
    border: 1px solid rgba(76,175,80,0.15);
  }

  /* Responsive */
  @media (max-width: 600px) {
    .container { padding: 12px; }
    header h1 { font-size: 18px; }
    .contact-grid { grid-template-columns: 1fr; }
    .stats-bar { flex-direction: column; gap: 10px; }
    .stats-bar .search-box { width: 100%; }
    .stats-bar .search-box input { width: 100%; }
  }

  /* Loading */
  .loading-dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }
</style>
</head>
<body>
<header>
  <div class="container">
    <h1>📤 WA Blast</h1>
    <p>Klik nama → otomatis buka WA → pesan terisi → tinggal send</p>
  </div>
</header>

<div class="container">
  <!-- Upload Excel -->
  <div class="upload-section" id="dropZone">
    <label for="fileInput">
      <span>📁</span> Upload File Excel (.xlsx)
    </label>
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <div class="info-text">Format: minimal kolom <strong>Nama</strong> & <strong>No HP</strong> (atau <strong>Phone</strong> / <strong>Telepon</strong>)</div>
    <div class="preview-data" id="previewData"></div>
  </div>

  <!-- Template -->
  <div class="template-section">
    <label for="templateMsg">✏️ Template Pesan</label>
    <textarea id="templateMsg" placeholder="Tulis template pesan... Gunakan {{nama}} untuk nama kontak">Assalamualaikum kak {{nama}} 🙏

Perkenalkan kami dari Belajar Dulu Aja. Ada program menarik nih untuk adik {{nama}} dari {{sekolah}}. Kami ingin mengundang untuk belajar bersama secara GRATIS!

Ada yang bisa kami bantu infokan lebih lanjut? 😊</textarea>
    <div class="hint">Gunakan <code>{{nama}}</code> untuk nama, <code>{{sekolah}}</code> untuk asal sekolah. Semua akan diganti otomatis.</div>
  </div>

  <!-- Contacts -->
  <div class="stats-bar" id="statsBar" style="display:none;">
    <div class="count">Total: <strong id="totalCount">0</strong> kontak</div>
    <div class="search-box">
      <span style="color:var(--text-dim);font-size:13px;">🔍</span>
      <input type="text" id="searchInput" placeholder="Cari nama...">
    </div>
  </div>

  <div id="contactList" class="contact-grid"></div>

  <div class="empty-state" id="emptyState">
    <div class="icon">📂</div>
    <p>Upload file Excel dulu untuk mulai</p>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
let contacts = [];

// ========== SheetJS: Read Excel ==========
function handleFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(sheet, { defval: '' });

      // Map columns (handle various Indonesian formats)
      contacts = json.map(row => {
        const name = row['NAMA SISWA'] || row['Nama Siswa'] || row['Nama'] || row['nama'] || row['Name'] || row['name'] || Object.values(row)[0] || '';
        const phone = String(
          row['No. Telp'] || row['No Telp'] || row['No Hp'] || row['No HP'] || row['no hp'] || row['no_hp'] || 
          row['Phone'] || row['phone'] || row['Telepon'] || row['telp'] ||
          row['WA'] || row['wa'] || row['WhatsApp'] || Object.values(row)[1] || ''
        ).replace(/[^0-9]/g, '');
        // Format phone: if starts with 0, replace with 62
        const cleanPhone = phone.replace(/^0+/, '62');
        return { 
          name: String(name).trim(), 
          phone: cleanPhone,
          sekolah: row['ASAL SEKOLAH'] || row['Asal Sekolah'] || '',
          gender: row['L/P'] || ''
        };
      }).filter(c => c.name && c.phone.length >= 10 && c.phone !== '62');

      // Show preview
      const preview = document.getElementById('previewData');
      preview.textContent = `✓ ${contacts.length} kontak berhasil dimuat`;

      renderContacts();
    } catch(err) {
      showToast('Gagal baca file: ' + err.message, true);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ========== Render ==========
function renderContacts() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  const filtered = query ? contacts.filter(c => c.name.toLowerCase().includes(query)) : contacts;

  const list = document.getElementById('contactList');
  const empty = document.getElementById('emptyState');
  const stats = document.getElementById('statsBar');
  const total = document.getElementById('totalCount');

  if (contacts.length === 0) {
    list.innerHTML = '';
    stats.style.display = 'none';
    empty.style.display = 'block';
    return;
  }

  stats.style.display = 'flex';
  total.textContent = contacts.length;
  empty.style.display = 'none';

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><p>Tidak ditemukan</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(c => {
    const initial = c.name.charAt(0).toUpperCase();
    const cleanPhone = c.phone.startsWith('62') ? c.phone : '62' + c.phone.replace(/^0+/, '');
    return `
      <div class="contact-card" onclick="sendWA('${cleanPhone}', '${c.name.replace(/'/g, "\\'")}', '${(c.sekolah || '').replace(/'/g, "\\'")}')" title="Klik untuk kirim WA">
        <div class="avatar">${initial}</div>
        <div class="info">
          <div class="name">${c.name}</div>
          <div class="phone">+${cleanPhone}</div>
          ${c.sekolah ? `<div class="sekolah">${c.sekolah}</div>` : ''}
        </div>
        <div class="wa-icon">💬</div>
      </div>
    `;
  }).join('');
}

// ========== Send WA ==========
function sendWA(phone, name, sekolah) {
  const template = document.getElementById('templateMsg').value;
  let msg = template.replace(/\{\{nama\}\}/g, name);
  msg = msg.replace(/\{\{Nama\}\}/g, name);
  msg = msg.replace(/\{\{sekolah\}\}/g, sekolah || '');
  msg = msg.replace(/\{\{Sekolah\}\}/g, sekolah || '');

  const encoded = encodeURIComponent(msg);
  const url = `https://wa.me/${phone}?text=${encoded}`;

  window.open(url, '_blank');
  showToast(`✓ Membuka WA untuk ${name}`);
}

// ========== Toast ==========
function showToast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = isError ? 'rgba(255,107,107,0.3)' : 'rgba(0,229,255,0.15)';
  el.style.color = isError ? '#FF6B6B' : '#E0E6F0';
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ========== File input ==========
document.getElementById('fileInput').addEventListener('change', function(e) {
  if (e.target.files.length) handleFile(e.target.files[0]);
});

// ========== Drag & Drop ==========
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('dragover');
});
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});

// ========== Search ==========
document.getElementById('searchInput').addEventListener('input', renderContacts);

// ========== Load sample if any data embedded ==========
// The user can also embed JSON data below if preferred
</script>
</body>
</html>
